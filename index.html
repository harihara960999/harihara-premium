<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HariHara Digital</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050505;
font-family:'Poppins',sans-serif;
color:#fff;
overflow-x:hidden;
}

.loader{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
animation:hideLoader .8s ease forwards;
animation-delay:2.2s;
}

.brand{
font-family:'Orbitron',sans-serif;
font-size:58px;
font-weight:900;
letter-spacing:10px;
animation:intro 1.5s ease;
text-shadow:0 0 30px rgba(255,255,255,.35);
}

.sub{
margin-top:18px;
letter-spacing:12px;
color:#bdbdbd;
font-size:18px;
animation:fade 2s ease;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
background:linear-gradient(180deg,#050505,#111);
}

.hero h1{
font-size:64px;
font-family:'Orbitron',sans-serif;
line-height:1.15;
animation:rise 1.2s ease;
}

.hero span{
color:#ff5b5b;
}

.btn{
display:inline-block;
margin-top:30px;
padding:18px 40px;
background:#ff5b5b;
color:#fff;
text-decoration:none;
border-radius:40px;
transition:.35s;
}

.btn:hover{
transform:translateY(-4px) scale(1.05);
}

@keyframes intro{
0%{
opacity:0;
transform:scale(.4) rotate(-360deg);
}
100%{
opacity:1;
transform:scale(1) rotate(0);
}
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

@keyframes rise{
from{
opacity:0;
transform:translateY(80px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes hideLoader{
to{
opacity:0;
visibility:hidden;
}
}
</style>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="loader">
<div class="brand">HARIHARA</div>
<div class="sub">DIGITAL</div>
</div>

<section class="hero">
<div>
<h1>Create <span>Premium</span><br>Digital Experiences</h1>

<p style="margin-top:25px;color:#bbb;font-size:20px">
Luxury Websites • Branding • Digital Growth
</p>

<a class="btn" href="https://wa.me/918333847909">Chat on WhatsApp</a>
</div>
</section>
<script src="script.js"></script>
</body>
  </html>
